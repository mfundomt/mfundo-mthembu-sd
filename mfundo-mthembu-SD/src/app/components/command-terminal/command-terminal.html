<div class="terminal-wrap" role="region" aria-label="Project terminal">

    <!-- Title bar -->
    <div class="titlebar">
        <div class="traffic-lights" aria-hidden="true">
            <span class="dot close"></span>
            <span class="dot min"></span>
            <span class="dot max"></span>
        </div>
        <div class="title-label">
            <span class="title-icon">💻</span>
            <span class="visually-hidden">Terminal –</span>
            My Career Explorer
        </div>
    </div>

    <!-- Level toolbar -->
    <div class="level-bar">
        <div class="level-left">
            <span class="bolt" aria-hidden="true">⚡</span>
            <span class="level-prefix">Level:</span>
            <span class="level-name">{{ levelName }}</span>
        </div>
        <div class="level-btns">
            <button type="button" class="level-btn" (click)="runQuickCommand('show goal')">
                Show Goal
            </button>
            <button type="button" class="level-btn" (click)="runQuickCommand('help')">
                Instructions
            </button>
        </div>
    </div>

    <!-- Command history display -->
    <div class="cmd-display" #cmdDisplay role="log" aria-live="polite" aria-label="Command history">
        <div *ngFor="let entry of commandHistory" [id]="'command_' + entry.id" class="cmd-row">
            <p class="cmd-line">
                <span class="prompt" aria-hidden="true">$</span>
                <span class="cmd-text">{{ entry.input }}</span>
                <span class="cmd-icons" aria-hidden="true">
                    <span class="icon-dot warn"></span>
                    <span class="icon-dot idle"></span>
                    <span class="icon-dot done"></span>
                    <span class="icon-dot check"></span>
                </span>
            </p>
            <div *ngIf="entry.result" class="cmd-result">
                <p>{{ entry.result }}</p>
            </div>
        </div>
    </div>

    <!-- Input bar -->
    <div class="cmd-bar">
        <span class="prompt-sign" aria-hidden="true">$</span>
        <div class="cmd-input-wrap">
            <input #cmdInput class="cmd-input" id="commandTextField" type="text" [(ngModel)]="inputValue"
                (ngModelChange)="onInputChange()" (keydown)="onKeyDown($event)" autocomplete="off" autocorrect="off"
                autocapitalize="off" spellcheck="false" placeholder="type a command..." aria-label="Command input" />
            <span *ngIf="hint" class="cmd-hint" aria-hidden="true">{{ hint }}</span>
        </div>
    </div>

</div>
